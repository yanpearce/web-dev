  <body>

<div id="header" style="text-align: center">
  <h1>List of Stuff</h1>
</div>
<div>
  <div id="list-maker" style="text-align: center">
    
    <label for="text-box">New Stuff:</label>

    <button id="add-stuff" onclick="addStuff(event)">Add More Stuff</button>

  </div>
  
  <div id="list">
    
    <ul id="stuff">
    </ul> 
  </div>
</div>
